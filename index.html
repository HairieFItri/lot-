<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <title>Taman Putra Harmoni - Laporan Lot Profesional</title>
    
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        html, body { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #121212; }
        #main-container { display: flex; flex-direction: column; height: 100vh; }
        #header { height: 60px; background: #b71c1c; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1001; }
        #content-body { display: flex; flex: 1; overflow: hidden; position: relative; }
        #map { flex: 1; background: #242424; }
        #sidebar { width: 350px; background: #1e272e; color: #ecf0f1; padding: 20px; overflow-y: auto; z-index: 1000; transition: 0.3s; }
        #sidebar.closed { margin-right: -350px; }
        
        .control-card { background: #2f3640; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #e74c3c; }
        .info-data { font-size: 1.1rem; font-weight: bold; color: #e74c3c; margin-top: 5px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-blue:hover { background: #3498db; }
        
        .lot-label-permanent { background: transparent; border: none; color: white; font-weight: bold; text-shadow: 2px 2px 4px black; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="Logo poli fo gis.png" height="40" alt="Logo">
            <span style="font-weight: bold; font-size: 1.2rem;">TAMAN PUTRA HARMONI</span>
        </div>
    </div>

    <div id="content-body">
        <div id="map"></div>

        <div id="sidebar">
            <span style="color: #e74c3c; font-weight: bold;">INFO LOT TERPILIH</span>
            <div class="control-card" id="info-panel">
                <div style="margin-bottom: 10px;">
                    <small>NO. LOT</small>
                    <div class="info-data" id="val-lot">-</div>
                </div>
                <div style="margin-bottom: 10px;">
                    <small>PEMILIK</small>
                    <div class="info-data" id="val-owner">-</div>
                </div>
                <div style="margin-bottom: 10px;">
                    <small>KELUASAN</small>
                    <div class="info-data" id="val-area">-</div>
                </div>
                <div>
                    <small>KOORDINAT (LAT/LONG)</small>
                    <div class="info-data" id="val-coords" style="font-size: 0.9rem;">-</div>
                </div>
            </div>

            <div class="control-card">
                <input type="text" id="inputSearchLot" placeholder="Cari No Lot..." style="width: 100%; padding: 10px; border-radius: 5px; border: none;">
                <button class="btn btn-blue" id="pdf-btn" onclick="generateFullPDF()"><i class="fas fa-file-pdf"></i> JANA LAPORAN PDF</button>
            </div>
        </div>
    </div>
</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TITIKCLEANGABUNG_1.js"></script>

<script>
    var selectedLotData = null;
    var highlightLayer = null;

    var map = L.map('map', { zoomControl: true, maxZoom: 22 }).setView([2.1038, 102.5218], 18);
    
    var satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        crossOrigin: 'anonymous', maxZoom: 22
    }).addTo(map);

    function lotStyle(feature) {
        return { color: '#ffffff', weight: 1, fillColor: '#e74c3c', fillOpacity: 0.2 };
    }

    var lotLayer = L.geoJson(json_LOTFINAL_0, {
        style: lotStyle,
        onEachFeature: function(feature, layer) {
            if (feature.properties && feature.properties.NO_LOT) {
                layer.bindTooltip(feature.properties.NO_LOT.toString(), {
                    permanent: true, direction: 'center', className: 'lot-label-permanent'
                });
            }
            layer.on('click', function() { selectThisLot(feature, layer); });
        }
    }).addTo(map);

    function selectThisLot(feature, layer) {
        selectedLotData = feature;
        const props = feature.properties;
        const center = layer.getBounds().getCenter();

        // 1. Kemaskini UI Sidebar
        document.getElementById('val-lot').innerText = props.NO_LOT || '-';
        document.getElementById('val-owner').innerText = props["tsp — pe"] || "TIADA MAKLUMAT";
        document.getElementById('val-area').innerText = props.AREA ? parseFloat(props.AREA).toFixed(2) + " m²" : "-";
        document.getElementById('val-coords').innerText = `${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}`;

        // 2. Highlight Tepat pada Sempadan
        if(highlightLayer) map.removeLayer(highlightLayer);
        highlightLayer = L.geoJson(feature, {
            style: { color: '#ffff00', weight: 4, fillColor: '#ffff00', fillOpacity: 0.4 }
        }).addTo(map);

        map.fitBounds(layer.getBounds(), { padding: [50, 50] });
    }

    async function generateFullPDF() {
        const { jsPDF } = window.jspdf;
        const noLot = document.getElementById('val-lot').innerText;
        const pdfBtn = document.getElementById('pdf-btn');

        if(noLot === "-" || !selectedLotData) {
            alert("Sila pilih lot di atas peta dahulu!");
            return;
        }

        pdfBtn.disabled = true;
        pdfBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menjana...';

        // Pastikan peta fokus pada lot terpilih sebelum snap
        map.fitBounds(highlightLayer.getBounds(), { padding: [100, 100] });
        
        try {
            // Tunggu sebentar untuk rendering map selesai
            await new Promise(r => setTimeout(r, 1500));
            
            const canvas = await html2canvas(document.getElementById('map'), { useCORS: true, scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // --- HEADER PDF ---
            doc.setFillColor(183, 28, 28);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("LAPORAN MAKLUMAT LOT", 105, 18, {align: 'center'});
            doc.setFontSize(12);
            doc.text("Taman Putra Harmoni Resident", 105, 28, {align: 'center'});

            // --- PETA ---
            doc.setDrawColor(0);
            doc.setLineWidth(1);
            doc.addImage(imgData, 'PNG', 15, 50, 180, 100);
            doc.rect(15, 50, 180, 100);

            // --- MAKLUMAT LOT (TABEL/LIST) ---
            doc.setTextColor(0);
            doc.setFontSize(14);
            doc.text("BUTIRAN TERPERINCI", 15, 165);
            doc.setLineWidth(0.5);
            doc.line(15, 167, 195, 167);

            doc.setFontSize(11);
            const details = [
                ["NOMBOR LOT", document.getElementById('val-lot').innerText],
                ["PEMILIK", document.getElementById('val-owner').innerText],
                ["KELUASAN", document.getElementById('val-area').innerText],
                ["KOORDINAT", document.getElementById('val-coords').innerText]
            ];

            let yPos = 175;
            details.forEach(item => {
                doc.setFont("helvetica", "bold");
                doc.text(item[0] + ":", 15, yPos);
                doc.setFont("helvetica", "normal");
                doc.text(item[1], 60, yPos);
                yPos += 10;
            });

            // --- FOOTER ---
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text("Dicetak secara digital pada: " + new Date().toLocaleString(), 105, 285, {align: 'center'});

            doc.save("Laporan_Lot_" + noLot + ".pdf");
        } catch (e) {
            alert("Ralat penjanaan PDF: " + e);
        } finally {
            pdfBtn.disabled = false;
            pdfBtn.innerHTML = '<i class="fas fa-file-pdf"></i> JANA LAPORAN PDF';
        }
    }
</script>
</body>
</html>
