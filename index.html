<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Taman Putra Harmoni - Dashboard</title>
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS ringkas supaya tak bersepah */
        html, body { height: 100%; margin: 0; font-family: sans-serif; background: #121212; color: white; }
        #main-container { display: flex; flex-direction: column; height: 100vh; }
        #header { height: 60px; background: #b71c1c; display: flex; align-items: center; padding: 0 20px; }
        #content-body { display: flex; flex: 1; position: relative; }
        #map { flex: 1; background: #242424; }
        #sidebar { width: 300px; background: #1e272e; padding: 20px; overflow-y: auto; }
        .control-card { background: #2f3640; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin-top: 5px; }
        .btn-blue { background: #2980b9; color: white; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="header">
        <b style="font-size: 1.2rem;">TAMAN PUTRA HARMONI RESIDENT</b>
    </div>

    <div id="content-body">
        <div id="map"></div>

        <div id="sidebar">
            <div class="control-card">
                <label>No Lot:</label>
                <input type="text" id="inputSearchLot" style="width:100%; margin: 5px 0;">
                <button class="btn" style="background: #c0392b; color:white;" onclick="findLot()">Cari Lot</button>
                <button id="pdf-btn" class="btn btn-blue" onclick="generateFullPDF()">Export PDF</button>
            </div>
            
            <div class="control-card" id="info-panel">
                <p>No Lot: <span id="val-lot">-</span></p>
                <p>Pemilik: <span id="val-owner">-</span></p>
                <p>Luas: <span id="val-area">-</span></p>
            </div>
        </div>
    </div>
</div>

<script src="js/leaflet.js"></script>
<script src="data/LOTFINAL_0.js"></script>
<script src="data/TITIKCLEANGABUNG_1.js"></script>

<script>
    var selectedLotData = null;

    // 1. Setup Map
    var map = L.map('map', { zoomControl: true }).setView([2.1038, 102.5218], 18);
    
    var satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        crossOrigin: 'anonymous', maxZoom: 22
    }).addTo(map);

    // 2. Load Layer Lot
    var lotLayer = L.geoJson(json_LOTFINAL_0, {
        style: { color: '#ffffff', weight: 1, fillColor: '#e74c3c', fillOpacity: 0.5 },
        onEachFeature: function(feature, layer) {
            layer.on('click', function() {
                selectedLotData = feature;
                document.getElementById('val-lot').innerText = feature.properties.NO_LOT;
                document.getElementById('val-owner').innerText = feature.properties["tsp — pe"] || "TIADA DATA";
                document.getElementById('val-area').innerText = feature.properties.AREA + " m²";
                
                lotLayer.setStyle({ color: '#ffffff', weight: 1, fillColor: '#e74c3c' });
                layer.setStyle({ fillColor: '#ffff00', fillOpacity: 0.7 });
                map.fitBounds(layer.getBounds());
            });
        }
    }).addTo(map);

    // 3. Fungsi PDF (Yang bos nak highlight kuning tu)
    async function generateFullPDF() {
        const { jsPDF } = window.jspdf;
        const noLot = document.getElementById('val-lot').innerText;
        const pdfBtn = document.getElementById('pdf-btn');

        if(noLot === "-" || !selectedLotData) { 
            alert("Pilih satu lot dulu dawg!"); 
            return; 
        }

        pdfBtn.disabled = true;
        pdfBtn.innerText = 'Menjana PDF...';

        // Sembunyi semua lot, tunjuk 1 lot highlight je
        map.removeLayer(lotLayer);
        var highlight = L.geoJson(selectedLotData, {
            style: { color: '#FFFF00', weight: 5, fillOpacity: 0 }
        }).addTo(map);

        try {
            await new Promise(r => setTimeout(r, 700)); // Tunggu map render
            const canvas = await html2canvas(document.getElementById('map'), { useCORS: true, scale: 2 });
            const doc = new jsPDF('p', 'mm', 'a4');

            doc.setFillColor(183, 28, 28);
            doc.rect(0, 0, 210, 30, 'F');
            doc.setTextColor(255, 255, 255);
            doc.text("LAPORAN RASMI LOT TANAH", 105, 15, {align: 'center'});

            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 40, 180, 100);
            
            doc.setTextColor(0,0,0);
            doc.text("No Lot: " + noLot, 20, 160);
            doc.text("Pemilik: " + document.getElementById('val-owner').innerText, 20, 170);

            doc.save("Laporan_" + noLot + ".pdf");
        } catch (e) {
            alert("Error: " + e);
        } finally {
            map.removeLayer(highlight);
            map.addLayer(lotLayer);
            pdfBtn.disabled = false;
            pdfBtn.innerText = 'Export PDF';
        }
    }

    function findLot() {
        var val = document.getElementById('inputSearchLot').value;
        lotLayer.eachLayer(function(l) {
            if(l.feature.properties.NO_LOT == val) { l.fire('click'); }
        });
    }
</script>

</body>
</html>
