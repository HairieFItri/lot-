<!doctype html>
<html lang="en">
<head>
    <style>
        /* Tambah ini untuk pastikan kualiti rendering */
        #map { background-color: #ffffff; } 
    </style>
</head>
<body>

<script>
    // ... (Kod inisialisasi map dan lotLayer dikekalkan) ...

    async function generateFullPDF() {
        const { jsPDF } = window.jspdf;
        const noLot = document.getElementById('val-lot').innerText;
        const owner = document.getElementById('val-owner').innerText;
        const area = document.getElementById('val-area').innerText;
        const pdfBtn = document.getElementById('pdf-btn');

        if (noLot === "-" || !selectedLotData) { 
            alert("Sila pilih lot pada peta dahulu!"); 
            return; 
        }

        pdfBtn.disabled = true;
        pdfBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menjana Laporan...';

        // 1. Fokuskan peta pada lot untuk kualiti gambar terbaik
        map.fitBounds(highlightLayer.getBounds(), { padding: [100, 100] });

        try {
            // Tunggu rendering tile map selesai
            await new Promise(r => setTimeout(r, 1500));

            // 2. Tangkap gambar peta
            const canvas = await html2canvas(document.getElementById('map'), { 
                useCORS: true, 
                scale: 2,
                logging: false 
            });
            const imgData = canvas.toDataURL('image/jpeg', 0.8);

            // 3. Cipta Dokumen PDF (A4 Landscape untuk rupa lebih profesional seperti dashboard)
            // Atau 'p' (Portrait) jika mahu ikut tepat imej contoh
            const doc = new jsPDF('p', 'mm', 'a4');
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();

            // --- REKA BENTUK FRAME (FRAME LUAR) ---
            doc.setDrawColor(40, 40, 40);
            doc.setLineWidth(0.5);
            doc.rect(5, 5, pageWidth - 10, pageHeight - 10); // Border luar

            // --- HEADER SECTION ---
            doc.setFillColor(240, 240, 240);
            doc.rect(5, 5, pageWidth - 10, 30, 'F');
            
            // Teks "PETA" di tengah
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(0, 0, 0);
            doc.text("PETA", pageWidth / 2, 25, { align: 'center' });

            // --- SIDEBAR MAKLUMAT (BAHAGIAN KIRI) ---
            const sideWidth = 65;
            doc.setDrawColor(180, 180, 180);
            doc.line(sideWidth + 5, 35, sideWidth + 5, pageHeight - 5); // Garis pemisah kiri

            // Logo & Nama Institusi
            doc.setFontSize(10);
            doc.text("POLITEKNIK UNGKU OMAR", 10, 45);
            doc.setLineWidth(0.2);
            doc.line(10, 47, sideWidth, 47);

            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text("NEGERI: JOHOR", 10, 55);
            doc.text("DAERAH: TANGKAK", 10, 60);
            doc.text("MUKIM: KESANG", 10, 65);

            // Informasi Lot Header
            doc.setFont("helvetica", "bold");
            doc.text("INFORMASI LOT", 10, 80);
            doc.line(10, 82, sideWidth, 82);

            // Data Dinamik
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text("NO. LOT:", 10, 90);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(noLot, 10, 95);

            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text("NAMA PEMILIK:", 10, 105);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(9);
            // Fungsi wrap text jika nama panjang
            const splitOwner = doc.splitTextToSize(owner, sideWidth - 10);
            doc.text(splitOwner, 10, 110);

            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text("KELUASAN:", 10, 125);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(area, 10, 130);

            // Tarikh & Semakan
            doc.setFontSize(7);
            doc.text("TARIKH CETAKAN: " + new Date().toLocaleDateString(), 10, 250);
            doc.text("DISEMAK OLEH: ANIQ", 10, 270);
            doc.line(10, 275, sideWidth, 275);

            // --- VISUAL PETA (BAHAGIAN KANAN) ---
            const mapX = sideWidth + 10;
            const mapY = 40;
            const mapWidth = pageWidth - sideWidth - 20;
            const mapHeight = 150; // Tinggi imej peta

            // Border untuk peta
            doc.setDrawColor(0, 0, 0);
            doc.rect(mapX - 1, mapY - 1, mapWidth + 2, mapHeight + 2);
            doc.addImage(imgData, 'JPEG', mapX, mapY, mapWidth, mapHeight);

            // Nota Kaki (Watermark kecil)
            doc.setFontSize(6);
            doc.setTextColor(150);
            doc.text("Dokumen ini dijana secara digital melalui Sistem Pengurusan Tanah Taman Putra Harmoni.", pageWidth / 2, pageHeight - 7, { align: 'center' });

            // 4. Muat Turun
            doc.save("Laporan_Lot_" + noLot + ".pdf");

        } catch (e) {
            console.error(e);
            alert("Ralat semasa menjana PDF. Pastikan semua fail data dimuatkan dengan betul.");
        } finally {
            pdfBtn.disabled = false;
            pdfBtn.innerHTML = '<i class="fas fa-file-pdf"></i> Export PDF';
        }
    }
</script>
</body>
</html>
