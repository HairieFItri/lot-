<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>Cempaka Digital Resident - Dashboard</title>
        
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <style>
            html, body { height: 100%; margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
            
            /* Layout Structure */
            #main-wrapper { display: flex; flex-direction: column; height: 100vh; }
            
            /* Header */
            #header { 
                height: 70px; background: #1b5e20; color: white; display: flex; 
                align-items: center; justify-content: space-between; padding: 0 25px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.3); z-index: 1100;
            }
            .logo-section { display: flex; align-items: center; gap: 15px; }
            .logo-section img { height: 50px; background: white; padding: 3px; border-radius: 5px; }
            .header-title { font-size: 1.4rem; font-weight: 800; letter-spacing: 1.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

            /* Content Area */
            #content-body { display: flex; flex: 1; overflow: hidden; }
            #map { flex: 1; height: 100%; background: #f0f0f0; }

            /* Sidebar */
            #sidebar { 
                width: 340px; background: #1e272e; color: #f5f6fa; 
                padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
                box-shadow: -2px 0 10px rgba(0,0,0,0.2);
            }

            /* UI Elements */
            .section-label { color: #4cd137; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 8px; display: block; border-bottom: 1px solid #3d3d3d; padding-bottom: 5px; }
            .card { background: #2f3640; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
            
            input[type="text"], select { 
                width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 10px; 
                border-radius: 6px; border: 1px solid #485460; background: #1e272e; color: white; box-sizing: border-box;
            }

            .btn { 
                width: 100%; padding: 12px; border: none; border-radius: 6px; 
                font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: all 0.2s;
                display: flex; align-items: center; justify-content: center; gap: 10px;
            }
            .btn-green { background: #44bd32; color: white; }
            .btn-red { background: #e84118; color: white; }
            .btn-blue { background: #0097e6; color: white; }
            .btn:hover { filter: brightness(1.2); transform: translateY(-1px); }

            /* Info Results */
            .info-box { background: #353b48; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 5px solid #44bd32; }
            .info-title { font-size: 0.7rem; color: #bdc3c7; display: block; }
            .info-data { font-size: 1.1rem; font-weight: bold; color: #4cd137; margin-top: 3px; }

            /* Slider */
            .slider-ui { width: 100%; height: 8px; border-radius: 5px; background: #485460; outline: none; margin: 15px 0; -webkit-appearance: none; }
            .slider-ui::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #44bd32; border-radius: 50%; cursor: pointer; }
        </style>
    </head>
    <body>
        <div id="main-wrapper">
            <div id="header">
                <div class="logo-section">
                    <img src="https://upload.wikimedia.org/wikipedia/ms/thumb/8/87/Logo_Politeknik_Ungku_Omar.png/200px-Logo_Politeknik_Ungku_Omar.png" alt="Logo PUO">
                    <span class="header-title">CEMPAKA DIGITAL RESIDENT</span>
                </div>
                <div style="font-size: 0.9rem; opacity: 0.8;"><i class="fas fa-calendar-alt"></i> <span id="currentDate"></span></div>
            </div>

            <div id="content-body">
                <div id="map"></div>

                <div id="sidebar">
                    <div>
                        <span class="section-label"><i class="fas fa-layer-group"></i> Kawalan Lapisan</span>
                        <div class="card">
                            <label style="font-size: 0.8rem;">Pilih Peta Asas:</label>
                            <select id="baseMapSelect" onchange="switchBaseMap(this.value)">
                                <option value="satellite">Satelit (Esri World Imagery)</option>
                                <option value="street">Jalan (OpenStreetMap)</option>
                            </select>
                            
                            <label style="font-size: 0.8rem;">Ketelusan Lot (Opacity):</label>
                            <input type="range" class="slider-ui" min="0" max="1" step="0.1" value="0.5" id="opacityRange" oninput="updateOpacity(this.value)">
                        </div>
                    </div>

                    <div id="print-area">
                        <span class="section-label"><i class="fas fa-search-location"></i> Land Explorer</span>
                        <div class="card">
                            <input type="text" id="searchField" placeholder="Masukkan No Lot (Contoh: 1234)...">
                            <button class="btn btn-green" onclick="searchLot()"><i class="fas fa-search"></i> Cari Lot</button>
                            <button class="btn btn-red" onclick="resetView()"><i class="fas fa-sync-alt"></i> Reset Fokus</button>
                            <button class="btn btn-blue" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Jana Laporan PDF</button>
                        </div>

                        <div class="card" style="border-top: 2px solid #4cd137;">
                            <div class="info-box">
                                <span class="info-title">NO. LOT</span>
                                <div class="info-data" id="displayNoLot">-</div>
                            </div>
                            <div class="info-box">
                                <span class="info-title">LUAS KAWASAN</span>
                                <div class="info-data" id="displayArea">-</div>
                            </div>
                            <div class="info-box">
                                <span class="info-title">STATUS</span>
                                <div class="info-data">BERDAFTAR</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        
        <script src="data/LOTFINAL_0.js"></script>
        <script src="data/TITIKCLEANGABUNG_1.js"></script>

        <script>
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ms-MY', { day: 'numeric', month: 'long', year: 'numeric' });

            var highlightLayer;
            function highlightFeature(e) {
                highlightLayer = e.target;
                highlightLayer.openPopup();
                
                // Update Sidebar bila klik pada lot
                var props = e.target.feature.properties;
                document.getElementById('displayNoLot').innerText = props['NO_LOT'] || '-';
                document.getElementById('displayArea').innerText = props['AREA'] ? props['AREA'] + " m²" : '-';
            }

            var map = L.map('map', {
                zoomControl:true, maxZoom:28, minZoom:1
            }).fitBounds([[2.1034513083154147,102.5210683936583],[2.1041290307676266,102.52250576554476]]);

            // Layers
            var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri Satellite'
            }).addTo(map);

            var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: 'OpenStreetMap'
            });

            function switchBaseMap(type) {
                if (type === 'street') {
                    map.removeLayer(satelliteLayer);
                    streetLayer.addTo(map);
                } else {
                    map.removeLayer(streetLayer);
                    satelliteLayer.addTo(map);
                }
            }

            // Fungsi Opacity
            function updateOpacity(val) {
                layer_LOTFINAL_0.setStyle({ fillOpacity: val });
            }

            var bounds_group = new L.featureGroup([]);

            function pop_LOTFINAL_0(feature, layer) {
                layer.on({
                    click: highlightFeature
                });
                var popupContent = '<b>No Lot:</b> ' + feature.properties['NO_LOT'];
                layer.bindPopup(popupContent);
            }

            function style_LOTFINAL_0_0() {
                return {
                    pane: 'pane_LOTFINAL_0',
                    opacity: 1,
                    color: 'rgba(255,255,255,1.0)',
                    dashArray: '',
                    lineCap: 'butt',
                    lineJoin: 'miter',
                    weight: 1.0, 
                    fill: true,
                    fillOpacity: 0.5,
                    fillColor: 'rgba(229,182,54,1.0)',
                    interactive: true,
                }
            }
            map.createPane('pane_LOTFINAL_0');
            map.getPane('pane_LOTFINAL_0').style.zIndex = 400;

            var layer_LOTFINAL_0 = new L.geoJson(json_LOTFINAL_0, {
                pane: 'pane_LOTFINAL_0',
                onEachFeature: pop_LOTFINAL_0,
                style: style_LOTFINAL_0_0,
            });
            bounds_group.addLayer(layer_LOTFINAL_0);
            map.addLayer(layer_LOTFINAL_0);

            // Fungsi Search
            function searchLot() {
                var val = document.getElementById('searchField').value;
                var found = false;
                layer_LOTFINAL_0.eachLayer(function(l) {
                    if (l.feature.properties['NO_LOT'] == val) {
                        map.fitBounds(l.getBounds());
                        l.openPopup();
                        document.getElementById('displayNoLot').innerText = l.feature.properties['NO_LOT'];
                        document.getElementById('displayArea').innerText = l.feature.properties['AREA'] + " m²";
                        found = true;
                    }
                });
                if(!found) alert("No Lot tidak dijumpai!");
            }

            function resetView() {
                map.fitBounds(bounds_group.getBounds());
            }

            // Fungsi PDF
            async function exportPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const element = document.getElementById('print-area');

                html2canvas(element, { backgroundColor: '#1e272e' }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    doc.setFontSize(20);
                    doc.setTextColor(27, 94, 32);
                    doc.text("LAPORAN RESIDENSI DIGITAL", 20, 20);
                    doc.setFontSize(12);
                    doc.setTextColor(100);
                    doc.text("Dijana pada: " + new Date().toLocaleString(), 20, 30);
                    doc.line(20, 35, 190, 35);
                    
                    doc.addImage(imgData, 'PNG', 20, 45, 80, 100);
                    doc.setTextColor(0);
                    doc.text("Nota: Laporan ini adalah ringkasan rasmi bagi lot yang dipilih.", 20, 160);
                    
                    var noLot = document.getElementById('displayNoLot').innerText;
                    doc.save("Laporan_Lot_" + noLot + ".pdf");
                });
            }
        </script>
    </body>
</html>
